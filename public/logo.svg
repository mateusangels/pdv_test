<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="grad" x1="10" y1="4" x2="42" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="52" y1="10" x2="190" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Icon: hexagon with chart bars -->
  <polygon points="18,4 34,4 42,18 34,32 18,32 10,18" fill="url(#grad)" />
  <rect x="16" y="22" width="4" height="6" rx="1" fill="white" opacity="0.9"/>
  <rect x="22" y="17" width="4" height="11" rx="1" fill="white" opacity="0.9"/>
  <rect x="28" y="12" width="4" height="16" rx="1" fill="white" opacity="0.9"/>
  <polyline points="33,15 36,12 39,15" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Company name -->
  <text x="52" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="800" fill="url(#textgrad)" letter-spacing="0.2">Oliver Soft Tech</text>
  <text x="53" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="600" fill="#6366f1" letter-spacing="2">SOLUÇÕES EM SISTEMAS</text>
</svg>
